name: Turbo.az watcher

on:
  schedule:
    - cron: "*/10 * * * *"   # каждые 10 минут (время UTC)
  workflow_dispatch:          # позволяет запустить вручную кнопкой на GitHub

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
        run: python scraper.py

      - name: Commit updated seen_ids.json
        run: |
          git config user.name "turbo-watch-bot"
          git config user.email "actions@github.com"
          git add seen_ids.json
          git diff --quiet && git diff --staged --quiet || git commit -m "update seen ids"
          git push
